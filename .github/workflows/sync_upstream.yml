name: Sync upstream to main and production

on:
  schedule:
    - cron: '17 3 * * *'   # UTC（任意で変更）
  workflow_dispatch:

permissions:
  contents: write

env:
  # 親の owner/repo を指定
  UPSTREAM_REPO: 9am-pasteur/azure_dual_api_chat
  # 子に残したいパス（.github だけ or .github/workflows など）
  PROTECTED_PATH: .github

jobs:
  sync:
    # 親リポジトリでは実行しない
    if: ${{ github.repository != '9am-pasteur/azure_dual_api_chat' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # 必要に応じて分岐数を増やせます
      matrix:
        include:
          - local: main
            upstream: main
          - local: production
            upstream: production

    steps:
      - name: Checkout child repo (target branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ matrix.local }}

      - name: Configure Git identity
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          if git remote | grep -q '^upstream$'; then
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          else
            git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          fi
          git fetch upstream --prune

      - name: Save current commit (for restore)
        id: save_old
        run: echo "hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Try fast-forward first
        id: ff
        run: |
          set -e
          if git merge --ff-only "upstream/${{ matrix.upstream }}"; then
            echo "ff_done=true" >> "$GITHUB_OUTPUT"
          else
            echo "ff_done=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: If not FF, merge while keeping protected path from child
        if: steps.ff.outputs.ff_done == 'false'
        run: |
          set +e
          git merge --no-edit --no-commit "upstream/${{ matrix.upstream }}"
          MERGE_STATUS=$?
          set -e

          OLD="${{ steps.save_old.outputs.hash }}"

          # マージ結果に含まれる .github を一旦 index / working tree から除去する
          git rm -r -f --cached --ignore-unmatch -- "$PROTECTED_PATH" || true
          rm -rf "$PROTECTED_PATH"

          # .github をマージ前の子リポジトリ側の状態に戻す
          if git cat-file -e "$OLD:$PROTECTED_PATH" 2>/dev/null; then
            git checkout "$OLD" -- "$PROTECTED_PATH"
          fi

          git add -A -- "$PROTECTED_PATH" 2>/dev/null || true

          # .github 以外に未解決コンフリクトが残っていたら失敗させる
          UNRESOLVED="$(git diff --name-only --diff-filter=U)"

          if [ -n "$UNRESOLVED" ]; then
            echo "::error::Conflicts remain outside $PROTECTED_PATH:"
            echo "$UNRESOLVED"
            git merge --abort || true
            exit 1
          fi

          # merge commit を作成
          if [ -f .git/MERGE_HEAD ]; then
            git commit --no-edit
          elif [ "$MERGE_STATUS" -ne 0 ]; then
            exit "$MERGE_STATUS"
          fi

      - name: Restore protected path after fast-forward
        if: steps.ff.outputs.ff_done == 'true'
        run: |
          set -e
          OLD="${{ steps.save_old.outputs.hash }}"

          # fast-forward の場合も upstream 側の .github が入る可能性があるため戻す
          git rm -r -f --cached --ignore-unmatch -- "$PROTECTED_PATH" || true
          rm -rf "$PROTECTED_PATH"

          if git cat-file -e "$OLD:$PROTECTED_PATH" 2>/dev/null; then
            git checkout "$OLD" -- "$PROTECTED_PATH"
          fi

          git add -A -- "$PROTECTED_PATH" 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "Restore $PROTECTED_PATH after upstream sync (${{ matrix.local }})"
          fi

      - name: Push changes
        run: |
          set -e
          git push origin "${{ matrix.local }}"

